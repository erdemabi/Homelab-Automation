trigger:
- main

pool:
  name: 'Home-Lab-Pool'

stages:
- stage: Homelab_Diagnostic
  displayName: 'Ev Laboratuvarı Teşhis Süreci'

  jobs:
  - job: Collect_Logs
    displayName: 'Sistem Raporu Toplama'

    steps:

    - task: SonarQubePrepare@8
      displayName: 'SonarQube Prepare'
      inputs:
        SonarQube: 'SonarQubeConnection'
        scannerMode: 'cli'
        configMode: 'manual'
        cliProjectKey: 'Homelab-Automation'
        cliProjectName: 'Homelab-Automation'
        cliSources: 'src'

    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/reports
        
        echo "=== UBUNTU SISTEM BILGISI ===" > $(Build.ArtifactStagingDirectory)/reports/system_info.txt
        uname -a >> $(Build.ArtifactStagingDirectory)/reports/system_info.txt
        cat /etc/os-release >> $(Build.ArtifactStagingDirectory)/reports/system_info.txt
        
        echo -e "\n=== RAM VE DISK DURUMU ===" >> $(Build.ArtifactStagingDirectory)/reports/system_info.txt
        free -h >> $(Build.ArtifactStagingDirectory)/reports/system_info.txt
        df -h / >> $(Build.ArtifactStagingDirectory)/reports/system_info.txt
        
        echo -e "\n=== KURULU PAKETLER VE SERVISLER ===" >> $(Build.ArtifactStagingDirectory)/reports/system_info.txt
        systemctl list-units --type=service --state=running | head -n 30 >> $(Build.ArtifactStagingDirectory)/reports/system_info.txt
      displayName: 'Rapor Dosyasını Oluştur'

    - script: |
        echo "Current directory:"
        pwd

        echo "Build.SourcesDirectory:"
        echo "$(Build.SourcesDirectory)"

        echo "Files:"
        ls -R "$(Build.SourcesDirectory)"
      displayName: 'Debug Source Files'

    - task: SonarQubeAnalyze@8
      displayName: 'SonarQube Analyze'

    - task: SonarQubePublish@8
      displayName: 'Publish Quality Gate Result'
      inputs:
        pollingTimeoutSec: '300'

    - script: |
        echo "Quality Gate kontrol ediliyor..."

        STATUS=$(curl -s -u "$(SONAR_TOKEN):" "http://localhost:9000/api/qualitygates/project_status?projectKey=Homelab-Automation" | grep -o '"status":"[^"]*"' | head -1 | cut -d':' -f2 | tr -d '"')

        echo "Quality Gate Status: $STATUS"

        if [ "$STATUS" != "OK" ]; then
          echo "Quality Gate FAILED ama pipeline devam edecek."
          exit 0
        fi

        echo "Quality Gate PASSED"
      displayName: 'Quality Gate Fail Olsa Bile Devam Et'

    - task: PublishBuildArtifacts@1
      displayName: 'Raporu Artifact Olarak Yayınla'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/reports'
        ArtifactName: 'Ubuntu_Sistem_Teşhis_Raporu'
        publishLocation: 'Container'